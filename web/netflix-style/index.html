<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>T9FOX — 監控清單</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── Top navbar ─────────────────────────────────────────── -->
<header class="nav">
  <div class="nav-logo">T9FOX<span class="nav-dot"></span></div>
  <nav class="nav-tabs">
    <button class="nav-tab nav-tab--active" data-view="watchlist">清單</button>
    <button class="nav-tab" data-view="chart">圖表</button>
    <button class="nav-tab" data-view="signals">訊號</button>
  </nav>
  <div class="nav-right">
    <span id="last-update" class="nav-ts"></span>
    <button id="btn-refresh" class="btn-refresh" title="從永豐金刷新即時報價">⟳ 刷新</button>
  </div>
</header>

<!-- ── Main layout ────────────────────────────────────────── -->
<div class="layout">

  <!-- ── Left sidebar: watchlist ──────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-search">
      <input id="search-input" class="search-input" type="text" placeholder="搜尋代號..." autocomplete="off" />
    </div>

    <!-- status groups injected by JS -->
    <div id="watchlist-panel" class="watchlist-panel">
      <div class="wl-loading">載入清單…</div>
    </div>
  </aside>

  <!-- ── Right: chart + table ─────────────────────────────── -->
  <main class="main">

    <!-- Chart panel -->
    <div class="chart-wrap" id="chart-wrap">
      <div class="chart-header">
        <div class="chart-symbol-info">
          <span id="chart-symbol" class="chart-sym">—</span>
          <span id="chart-price" class="chart-price"></span>
          <span id="chart-change" class="chart-chg"></span>
        </div>
        <div class="chart-tfs">
          <button class="tf-btn tf-btn--active" data-days="60">3M</button>
          <button class="tf-btn" data-days="125">6M</button>
          <button class="tf-btn" data-days="250">1Y</button>
          <button class="tf-btn" data-days="520">2Y</button>
        </div>
      </div>
      <div id="chart-container" class="chart-container"></div>
      <div id="chart-hint" class="chart-hint">點擊左側股票載入 K 線圖</div>
    </div>

    <!-- Signals table -->
    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">訊號一覽</span>
        <span id="table-date" class="table-date"></span>
      </div>
      <div class="table-scroll">
        <table class="sig-table" id="sig-table">
          <thead>
            <tr>
              <th class="col-sym" data-col="symbol">代號</th>
              <th class="col-num" data-col="open">開盤</th>
              <th class="col-num" data-col="close">收盤</th>
              <th class="col-num" data-col="gap_pct">漲跌%</th>
              <th class="col-num" data-col="volume">成交量</th>
              <th class="col-num" data-col="high_20d">20日高</th>
              <th class="col-num" data-col="gap">差距</th>
              <th class="col-num" data-col="gap_pct2">Gap%</th>
              <th class="col-sym" data-col="status">狀態</th>
            </tr>
          </thead>
          <tbody id="sig-tbody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js" crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>
</html>
